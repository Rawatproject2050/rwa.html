<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROZGAR WITH ANKIT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
        :root{--bg:#050810;--panel:#0d1527;--sky:#00e5ff;--gold:#ffab00;--text:#fff;--dim:#e2e8f0;--brd:#223354}
        .light{--bg:#f0f2f5;--panel:#fff;--text:#1c1e21;--dim:#4a5568;--brd:#cbd5e1}
        body{background:radial-gradient(circle at top right,#0f1c3f,var(--bg));color:var(--text);min-height:100vh;padding-bottom:70px;transition:.3s}
        
        .splash{position:fixed;inset:0;background:#050811;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:.5s}
        .splash.hide{opacity:0;pointer-events:none}
        .splash img{width:110px;height:110px;border-radius:24px;border:2px solid var(--sky);box-shadow:0 0 20px rgba(0,229,255,.5);margin-bottom:15px}
        .splash h1{font-size:22px;color:#fff;font-weight:800;letter-spacing:1px}
        .splash p{font-size:10px;color:var(--sky);font-weight:700;letter-spacing:2px;margin-top:5px;text-transform:uppercase}
        .splash .bar{width:140px;height:3px;background:rgba(255,255,255,.1);border-radius:3px;margin-top:25px;overflow:hidden}
        .splash .bar div{width:40%;height:100%;background:linear-gradient(90deg,var(--sky),#9d4edd);border-radius:3px;animation:load 1.5s infinite}
        @keyframes load{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
        .splash small{position:absolute;bottom:30px;font-size:8px;color:rgba(255,255,255,.2);letter-spacing:2px;text-transform:uppercase}
        
        header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:rgba(13,18,34,.95);position:sticky;top:0;z-index:100;border-bottom:2px solid var(--sky)}
        .logo{font-weight:900;color:var(--sky);font-size:14px;letter-spacing:1px}
        .timer{display:flex;align-items:center;gap:6px;background:rgba(0,229,255,.1);padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700}
        .dot{width:7px;height:7px;background:#22c55e;border-radius:50%;animation:pulse 1.5s infinite}
        @keyframes pulse{50%{opacity:.4}}
        
        .search{padding:14px 16px 8px}
        .search div{display:flex;align-items:center;background:var(--panel);border:1px solid var(--brd);padding:10px 14px;border-radius:12px;gap:10px}
        .search input{background:0 0;border:none;outline:none;color:var(--text);width:100%;font-size:13px;font-weight:600}
        .search input::placeholder{color:var(--dim)}
        .search i{color:var(--sky);font-size:14px}
        
        .tags{display:flex;gap:6px;overflow-x:auto;padding:6px 16px 10px;scrollbar-width:none}
        .tags::-webkit-scrollbar{display:none}
        .tag{padding:5px 12px;border-radius:16px;font-size:11px;font-weight:700;white-space:nowrap;cursor:pointer;background:var(--panel);border:1px solid var(--brd);color:var(--dim);flex-shrink:0;transition:.2s}
        .tag.on{background:var(--sky);color:#050810;border-color:var(--sky)}
        
        .list{padding:0 16px 16px;display:flex;flex-direction:column;gap:10px}
        .card{background:var(--panel);border-radius:12px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border:1px solid var(--brd);cursor:pointer;transition:.2s;gap:10px}
        .card:active{transform:scale(.98)}
        .card .left{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
        .card img{width:40px;height:40px;object-fit:contain;border-radius:8px;background:#fff;padding:2px;flex-shrink:0}
        .card .info h3{font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .card .info span{font-size:10px;color:var(--gold);font-weight:700}
        .card i{color:var(--dim);font-size:12px;flex-shrink:0}
        .more{justify-content:center!important;border:1px dashed var(--sky)!important;color:var(--sky)!important;font-weight:700!important;font-size:13px!important}
        
        .nav{position:fixed;bottom:0;left:0;width:100%;background:#090e1a;border-top:1px solid #1e2d54;display:flex;z-index:999;padding:8px 0 6px}
        .light .nav{background:#fff;border-color:#cbd5e1}
        .nav div{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:#9ca3af;cursor:pointer;font-size:9px;font-weight:700;letter-spacing:.3px}
        .nav i{font-size:17px}
        .nav .on{color:var(--sky)}
    </style>
</head>
<body>

<div class="splash" id="splash">
    <img src="https://i.postimg.cc/BQKSrcr2/logo.png" alt="">
    <h1>ROZGAR WITH ANKIT</h1>
    <p>Santosh Rawat</p>
    <div class="bar"><div></div></div>
    <small>Secure Engine</small>
</div>

<header id="head">
    <i class="fas fa-bars" style="font-size:20px;color:var(--sky);cursor:pointer" onclick="alert('Menu coming soon')"></i>
    <div class="logo">ROZGAR WITH ANKIT</div>
    <div class="timer"><div class="dot"></div><span id="tmr">0h 00m</span></div>
</header>

<div class="search">
    <div>
        <i class="fas fa-search"></i>
        <input id="search" placeholder="Search batch..." oninput="searchBatch()">
    </div>
</div>

<div class="tags" id="tags"></div>

<div class="list" id="list"></div>

<div class="nav">
    <div class="on" onclick="alert('Already on Home')"><i class="fas fa-home"></i>HOME</div>
    <div onclick="alert('Coming soon')"><i class="fas fa-bookmark"></i>SAVED</div>
    <div onclick="alert('Coming soon')"><i class="fab fa-telegram"></i>JOIN</div>
    <div onclick="alert('Coming soon')"><i class="fas fa-user"></i>PROFILE</div>
</div>

<script>
// छोटा और तेज़ data — 20 batches, तुरंत load होगा
const DATA = [
  {id:582,t:"UP Police Constable - खाकी Again बैच",p:"₹799",g:"UP Police"},
  {id:581,t:"UPSI भर्ती - थानेदार बैच",p:"₹899",g:"UP Police"},
  {id:580,t:"UP,MP,राजस्थान PCB 12th Class Toppers 2027",p:"₹999",g:"School"},
  {id:579,t:"UP,MP,राजस्थान PCM 12th Class Toppers 2027",p:"₹999",g:"School"},
  {id:578,t:"NEET UG 2027 - प्रारम्भ 3.0 बैच",p:"₹1499",g:"NEET/JEE"},
  {id:577,t:"UP PCS PRELIMS 2026 - प्रतिज्ञा बैच",p:"₹999",g:"UPSSSC"},
  {id:576,t:"Airforce Phase-2 Astra Online 3.0",p:"₹1499",g:"Airforce"},
  {id:575,t:"DELHI POLICE 2026-27 CONSTABLE VOD",p:"₹499",g:"Delhi Police"},
  {id:574,t:"Haryana Group-C CET Mains सुरक्षा चक्र",p:"₹899",g:"CAPF/BSF"},
  {id:573,t:"AIRFORCE - वायु 2/2027 Y-Group+ MA",p:"PAID",g:"Airforce"},
  {id:572,t:"AIRFORCE - वायु 2/2027 X-Group",p:"PAID",g:"Airforce"},
  {id:571,t:"SSC GD भर्ती 2027 (वीर बैच)",p:"PAID",g:"SSC"},
  {id:570,t:"SSC GD वीर बैच - Bangla",p:"PAID",g:"SSC"},
  {id:569,t:"SSC GD वीर बैच Complete",p:"PAID",g:"SSC"},
  {id:568,t:"Haryana CET Group-C 2026",p:"₹899",g:"CAPF/BSF"},
  {id:567,t:"UP Police Practice Set 2026",p:"₹499",g:"UP Police"},
  {id:566,t:"UKPSC Prelims 2025-26",p:"₹999",g:"UPSSSC"},
  {id:565,t:"Railway RRB NTPC 2026",p:"₹899",g:"Railway"},
  {id:564,t:"Railway RRB Group D 2026",p:"₹699",g:"Railway"},
  {id:563,t:"SSC CGL 2025-26",p:"₹1499",g:"SSC"}
];

const IMG = "https://appx-content-v2.classx.co.in/paid_course3/2026-06-30-0.7503537082274693.jpeg";
let loaded = 0, filter = "All", data = DATA;

function init(){
  setTimeout(()=>{
    document.getElementById('splash').classList.add('hide');
    buildTags();
    render();
    clock();
  },2000);
}

function buildTags(){
  const tags = ["All","SSC","Teaching","School","NEET/JEE","Army","Airforce","Navy","CAPF/BSF","UP Police","Delhi Police","Railway","Banking","UPSSSC","Other"];
  const el = document.getElementById('tags');
  tags.forEach(t=>{
    const span = document.createElement('span');
    span.className = "tag"+(t=="All"?" on":"");
    span.textContent = t;
    span.onclick = ()=>{
      document.querySelectorAll('.tag').forEach(x=>x.classList.remove('on'));
      span.classList.add('on');
      filter = t;
      loaded = 0;
      document.querySelectorAll('#list .card').forEach(x=>x.remove());
      render();
    };
    el.appendChild(span);
  });
}

function render(){
  const el = document.getElementById('list');
  const f = filter=="All" ? data : data.filter(x=>x.g==filter);
  const batch = f.slice(loaded, loaded+12);
  
  batch.forEach(b=>{
    const div = document.createElement('div');
    div.className = "card";
    div.innerHTML = `
      <div class="left">
        <img src="${IMG}" onerror="this.src='https://spidyuniverserwa.vercel.app/Lalit.jpg'">
        <div class="info">
          <h3>${b.t}</h3>
          <span>${b.p}</span>
        </div>
      </div>
      <i class="fas fa-chevron-right"></i>
    `;
    div.onclick = ()=> window.open(`https://spidyuniverserwa.vercel.app/course/${b.id}`,'_blank');
    el.appendChild(div);
  });
  
  loaded += batch.length;
  document.querySelectorAll('#list .more').forEach(x=>x.remove());
  
  if(loaded < f.length){
    const btn = document.createElement('div');
    btn.className = "card more";
    btn.textContent = `+${f.length-loaded} more`;
    btn.onclick = render;
    el.appendChild(btn);
  }
}

function searchBatch(){
  const q = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('#list .card:not(.more)').forEach(c=>{
    c.style.display = c.querySelector('h3').innerText.toLowerCase().includes(q) ? "flex" : "none";
  });
}

let sec = 0;
function clock(){
  setInterval(()=>{
    sec++;
    let h = Math.floor(sec/3600);
    let m = Math.floor((sec%3600)/60);
    document.getElementById('tmr').textContent = h+"h "+(m<10?"0":"")+m+"m";
  },1000);
}
</script>
</body>
</html>
