<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rawat Academy Hub</title>
<style>
/* ===== YOUR EXISTING STYLES HERE ===== */
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
body { background: #0a0a1a; color: #fff; }
/* ... अपने existing styles यहाँ रखें ... */

/* ===== NEW: Detail Page Styles ===== */
.detail-page { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
.detail-page.active { display: block; }
.detail-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
.detail-header h2 { font-size: 1.3rem; color: #f0c040; }
.back-btn { background: #2a2a4a; color: #fff; border: none; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
.back-btn:hover { background: #3a3a5a; }
.subjects-grid, .topics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.subject-card, .topic-card { background: #1a1a3a; border-radius: 12px; padding: 15px; cursor: pointer; transition: 0.2s; border: 1px solid #2a2a4a; }
.subject-card:hover, .topic-card:hover { background: #2a2a4a; border-color: #f0c040; }
.subject-card img, .topic-card img { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; margin-bottom: 8px; }
.subject-card h4, .topic-card h4 { font-size: 0.85rem; color: #ddd; }
.video-item { background: #1a1a3a; border-radius: 10px; padding: 12px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; border: 1px solid #2a2a4a; }
.video-item:hover { border-color: #f0c040; }
.video-item .play-icon { width: 40px; height: 40px; background: #f0c040; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #0a0a1a; font-weight: bold; flex-shrink: 0; }
.video-item .video-title { font-size: 0.9rem; color: #ddd; }
.video-player-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; margin: 15px 0; }
.video-player-container iframe { width: 100%; height: 100%; border: none; }
.loading { text-align: center; padding: 40px; color: #888; }
.section-title { font-size: 1.1rem; color: #f0c040; margin: 20px 0 12px; padding-bottom: 8px; border-bottom: 1px solid #2a2a4a; }
.main-page { display: block; }
.main-page.hidden { display: none; }
</style>
</head>
<body>

<!-- ===== MAIN PAGE (YOUR EXISTING CONTENT) ===== -->
<div id="mainPage" class="main-page">
  <!-- यहाँ आपका existing code रहेगा — header, sidebar, bottom nav, batch grid, etc. -->
  <!-- ... batch cards जो पहले से हैं ... -->
  
  <!-- IMPORTANT: Batch cards के links को इस तरह बदलें -->
  <!-- onclick="openCourse(event, '582')" जहाँ 582 course ID है -->
</div>

<!-- ===== NEW: COURSE DETAIL PAGE ===== -->
<div id="coursePage" class="detail-page">
  <div class="detail-header">
    <button class="back-btn" onclick="goBack()">← वापस</button>
    <h2 id="courseTitle">Rawat Academy</h2>
  </div>
  <div id="contentArea">
    <!-- Subjects / Topics / Videos dynamically loaded here -->
  </div>
</div>

<script>
// ===== CONFIG =====
const CORS_PROXY = 'https://api.allorigins.win/raw?url=';  // Free CORS proxy
// Alternative proxies if needed:
// const CORS_PROXY = 'https://corsproxy.io/?' ;
// const CORS_PROXY = 'https://api.codetabs.com/v1/proxy?quest=';

let historyStack = [];  // Navigation history

// ===== OPEN COURSE =====
function openCourse(e, courseId) {
  if(e) e.preventDefault();
  document.getElementById('mainPage').classList.add('hidden');
  document.getElementById('coursePage').classList.add('active');
  document.getElementById('courseTitle').textContent = 'Rawat Academy • कोर्स';
  historyStack = [{type: 'course', id: courseId}];
  loadSubjects(courseId);
}

// ===== LOAD SUBJECTS =====
async function loadSubjects(courseId) {
  const area = document.getElementById('contentArea');
  area.innerHTML = '<div class="loading">⏳ विषय लोड हो रहे हैं...</div>';
  
  try {
    // Fetch from SpidyUniverse course page
    const url = `https://spidyuniverserwa.vercel.app/course/${courseId}`;
    const resp = await fetch(CORS_PROXY + encodeURIComponent(url));
    const html = await resp.text();
    
    // Parse subjects from HTML
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const links = doc.querySelectorAll('a[href*="/course/' + courseId + '/subject/"]');
    
    let subjectsHtml = '<div class="section-title">📚 विषय (Subjects)</div><div class="subjects-grid">';
    let found = new Set();
    
    links.forEach(link => {
      const href = link.getAttribute('href');
      const subjectId = href.split('/subject/')[1];
      if(found.has(subjectId)) return;
      found.add(subjectId);
      
      const img = link.querySelector('img');
      const titleEl = link.querySelector('h3, h4, h5, .title, b, strong') || link;
      const title = titleEl.textContent.trim();
      const imgSrc = img ? img.getAttribute('src') : 'https://via.placeholder.com/200x100/1a1a3a/f0c040?text=Rawat';
      
      subjectsHtml += `
        <div class="subject-card" onclick="loadTopics('${courseId}', '${subjectId}', '${title.replace(/'/g, "\\'")}')">
          <img src="${imgSrc}" alt="${title}" onerror="this.src='https://via.placeholder.com/200x100/1a1a3a/f0c040?text=Rawat'">
          <h4>${title}</h4>
        </div>
      `;
    });
    
    subjectsHtml += '</div>';
    
    if(found.size === 0) {
      // Fallback: try getting course name at least
      const titleEl = doc.querySelector('title');
      area.innerHTML = `<div class="loading">⚠️ इस कोर्स में कोई विषय उपलब्ध नहीं है।<br><small>${titleEl ? titleEl.textContent : ''}</small></div>`;
    } else {
      area.innerHTML = subjectsHtml;
    }
  } catch(err) {
    area.innerHTML = `<div class="loading">❌ लोड करने में त्रुटि: ${err.message}</div>`;
  }
}

// ===== LOAD TOPICS =====
async function loadTopics(courseId, subjectId, subjectTitle) {
  const area = document.getElementById('contentArea');
  area.innerHTML = '<div class="loading">⏳ टॉपिक लोड हो रहे हैं...</div>';
  historyStack.push({type: 'subjects', courseId});
  
  try {
    const url = `https://spidyuniverserwa.vercel.app/course/${courseId}/subject/${subjectId}`;
    const resp = await fetch(CORS_PROXY + encodeURIComponent(url));
    const html = await resp.text();
    
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    
    // Get topics from subject page
    const links = doc.querySelectorAll('a[href*="/topic/"]');
    
    let topicsHtml = `<div class="section-title">📖 ${subjectTitle}</div><div class="topics-grid">`;
    let found = new Set();
    
    links.forEach(link => {
      const href = link.getAttribute('href');
      const topicId = href.split('/topic/')[1];
      if(found.has(topicId)) return;
      found.add(topicId);
      
      const title = link.textContent.trim().replace('Video Lecture', '').trim();
      
      topicsHtml += `
        <div class="topic-card" onclick="loadVideos('${courseId}', '${subjectId}', '${topicId}', '${title.replace(/'/g, "\\'")}')">
          <h4>▶ ${title}</h4>
        </div>
      `;
    });
    
    topicsHtml += '</div>';
    
    if(found.size === 0) {
      // Maybe this subject has video list directly in topic page
      area.innerHTML = topicsHtml = `<div class="section-title">📖 ${subjectTitle}</div><div class="loading">इस विषय में कोई टॉपिक नहीं है</div>`;
    }
    
    area.innerHTML = topicsHtml;
  } catch(err) {
    area.innerHTML = `<div class="loading">❌ लोड करने में त्रुटि: ${err.message}</div>`;
  }
}

// ===== LOAD VIDEOS =====
async function loadVideos(courseId, subjectId, topicId, topicTitle) {
  const area = document.getElementById('contentArea');
  area.innerHTML = '<div class="loading">⏳ वीडियो लोड हो रहे हैं...</div>';
  historyStack.push({type: 'topics', courseId, subjectId});
  
  try {
    const url = `https://spidyuniverserwa.vercel.app/course/${courseId}/subject/${subjectId}/topic/${topicId}`;
    const resp = await fetch(CORS_PROXY + encodeURIComponent(url));
    const html = await resp.text();
    
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    
    // Get all video lecture links
    const links = doc.querySelectorAll('a[href*="/topic/"]');
    
    // Also find if there's an iframe or video player
    const iframes = doc.querySelectorAll('iframe');
    const videoSrcs = doc.querySelectorAll('[src*="youtube"], [src*="youtu.be"], [src*="appx-content"], [src*="classx"]');
    
    let videosHtml = `<div class="section-title">🎬 ${topicTitle}</div>`;
    
    // If there's an embedded player, show it
    if(iframes.length > 0 || videoSrcs.length > 0) {
      let playerSrc = '';
      if(iframes.length > 0) playerSrc = iframes[0].getAttribute('src');
      else if(videoSrcs.length > 0) playerSrc = videoSrcs[0].getAttribute('src');
      
      if(playerSrc) {
        videosHtml += `
          <div class="video-player-container">
            <iframe src="${playerSrc}" allowfullscreen allow="autoplay; encrypted-media"></iframe>
          </div>
        `;
      }
    }
    
    // List all videos
    let found = new Set();
    let videoCount = 0;
    
    links.forEach(link => {
      const href = link.getAttribute('href');
      const vidTopicId = href.split('/topic/')[1];
      if(found.has(vidTopicId)) return;
      found.add(vidTopicId);
      videoCount++;
      
      const title = link.textContent.trim() || 'Video ' + videoCount;
      
      videosHtml += `
        <div class="video-item" onclick="playVideo('${courseId}', '${subjectId}', '${vidTopicId}')">
          <div class="play-icon">▶</div>
          <div class="video-title">${title}</div>
        </div>
      `;
    });
    
    if(videoCount === 0) {
      videosHtml += `<div class="loading">इस Topic में कोई वीडियो नहीं है</div>`;
    }
    
    area.innerHTML = videosHtml;
  } catch(err) {
    area.innerHTML = `<div class="loading">❌ लोड करने में त्रुटि: ${err.message}</div>`;
  }
}

// ===== PLAY VIDEO (Navigate to SpidyUniverse topic page with our proxy) =====
function playVideo(courseId, subjectId, topicId) {
  // Open in a new page on our site using proxy
  const area = document.getElementById('contentArea');
  area.innerHTML = '<div class="loading">⏳ वीडियो प्लेयर लोड हो रहा है...</div>';
  
  const topicUrl = `https://spidyuniverserwa.vercel.app/course/${courseId}/subject/${subjectId}/topic/${topicId}`;
  
  // Use proxy to fetch the page
  fetch(CORS_PROXY + encodeURIComponent(topicUrl))
    .then(r => r.text())
    .then(html => {
      // Find iframe/video source
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const iframe = doc.querySelector('iframe');
      
      if(iframe) {
        const src = iframe.getAttribute('src');
        area.innerHTML = `
          <div class="section-title">🎬 वीडियो</div>
          <div class="video-player-container">
            <iframe src="${src}" allowfullscreen allow="autoplay; encrypted-media"></iframe>
          </div>
          <button class="back-btn" onclick="history.back()" style="margin-top:10px">← वापस</button>
        `;
      } else {
        // Try to open directly - maybe it's a YouTube video
        const youtubeLinks = doc.querySelectorAll('[href*="youtube"], [href*="youtu.be"]');
        if(youtubeLinks.length > 0) {
          let ytUrl = youtubeLinks[0].getAttribute('href');
          // Convert to embed
          let videoId = '';
          if(ytUrl.includes('youtube.com/watch?v=')) videoId = ytUrl.split('v=')[1]?.split('&')[0];
          else if(ytUrl.includes('youtu.be/')) videoId = ytUrl.split('youtu.be/')[1]?.split('?')[0];
          
          if(videoId) {
            area.innerHTML = `
              <div class="section-title">🎬 वीडियो</div>
              <div class="video-player-container">
                <iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen allow="autoplay; encrypted-media"></iframe>
              </div>
              <button class="back-btn" onclick="history.back()" style="margin-top:10px">← वापस</button>
            `;
            return;
          }
        }
        
        // Last resort: show the page inside our UI
        area.innerHTML = `
          <div class="section-title">🎬 वीडियो</div>
          <div style="background:#1a1a3a; border-radius:12px; padding:15px; max-height:500px; overflow:auto;">
            ${html.replace(/Spidy Universe/gi, 'Rawat Academy').replace(/SPIDY UNIVERSE/gi, 'RAWAT ACADEMY').replace(/Lalit/gi, 'Rawat').replace(/spidyuniverserwa/g, 'rwa-html-six').replace(/Lalit\.jpg/g, '')}
          </div>
          <button class="back-btn" onclick="history.back()" style="margin-top:10px">← वापस</button>
        `;
      }
    })
    .catch(err => {
      area.innerHTML = `<div class="loading">❌ वीडियो लोड नहीं हुआ: ${err.message}</div>`;
    });
}

// ===== GO BACK =====
function goBack() {
  if(historyStack.length === 0) {
    document.getElementById('coursePage').classList.remove('active');
    document.getElementById('mainPage').classList.remove('hidden');
    return;
  }
  
  const prev = historyStack.pop();
  
  if(!prev) {
    document.getElementById('coursePage').classList.remove('active');
    document.getElementById('mainPage').classList.remove('hidden');
    return;
  }
  
  if(prev.type === 'course' || historyStack.length === 0) {
    // Go back to main page
    document.getElementById('coursePage').classList.remove('active');
    document.getElementById('mainPage').classList.remove('hidden');
  } else if(prev.type === 'subjects') {
    loadSubjects(prev.courseId);
  } else if(prev.type === 'topics') {
    const last = historyStack[historyStack.length - 1];
    loadTopics(last.courseId, last.subjectId, '');
  }
}

// ===== INIT: Update all batch cards to use our custom pages =====
document.addEventListener('DOMContentLoaded', function() {
  // Convert all existing batch card links
  document.querySelectorAll('a[href*="spidyuniverserwa.vercel.app/course/"]').forEach(link => {
    const match = link.href.match(/\/course\/(\d+)/);
    if(match) {
      const courseId = match[1];
      link.removeAttribute('href');
      link.style.cursor = 'pointer';
      link.addEventListener('click', function(e) {
        e.preventDefault();
        openCourse(e, courseId);
      });
    }
  });
  
  // Also handle inline onclick if you hardcoded them
});
</script>
</body>
</html>
